
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון חניון מלונות</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calculator-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #1a73e8;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:disabled {
            background-color: #f9f9f9;
            color: #666;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #e8f0fe;
            border-right: 6px solid #1a73e8;
            border-radius: 4px;
            display: none;
        }
        .total-price {
            font-size: 1.25em;
            font-weight: bold;
            color: #d93025;
        }
        .warning-note {
            margin-top: 15px;
            font-size: 0.85em;
            color: #5f6368;
            line-height: 1.4;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>מחשבון עלות חנייה בחניון האופרה</h2>
    
    <div class="form-group">
        <label for="hotelSelect">בחר מלון:</label>
        <select id="hotelSelect" onchange="calculateTotal()">
            <!-- נתונים מהמקורות: שם מלון ומחיר -->
            <option value="100">מלון דה הרברט (100 ₪)</option>
            <option value="110">מלון אופרה (110 ₪)</option>
            <option value="120">מלון פאלאס (120 ₪)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="entryDateTime">תאריך ושעת כניסה:</label>
        <input type="datetime-local" id="entryDateTime" onchange="syncTimes()">
    </div>

    <div class="form-group">
        <label for="exitDate">תאריך יציאה:</label>
        <input type="date" id="exitDate" onchange="calculateTotal()">
    </div>

    <div class="form-group">
        <label>שעת יציאה (לפי שעת כניסה):</label>
        <input type="text" id="exitTimeDisplay" disabled placeholder="תופיע לאחר בחירת כניסה">
    </div>

    <div id="resultArea" class="result-box">
        <div>סה"כ לתשלום: <span class="total-price" id="finalSum">0</span> ₪</div>
        <div class="warning-note">
            המחיר מחושב לפי שעת הכניסה (לכל 24 שעות) במידה ותצאו מעבר לשעת הכניסה לחניון תחויבו בההפרש לפי מחירון החניון.
        </div>
    </div>
</div>

<script>
    function syncTimes() {
        const entryVal = document.getElementById('entryDateTime').value;
        if (entryVal) {
            const entryDate = new Date(entryVal);
            const hours = entryDate.getHours().toString().padStart(2, '0');
            const minutes = entryDate.getMinutes().toString().padStart(2, '0');
            document.getElementById('exitTimeDisplay').value = hours + ":" + minutes;
            calculateTotal();
        }
    }

    function calculateTotal() {
        const pricePerDay = parseInt(document.getElementById('hotelSelect').value);
        const entryVal = document.getElementById('entryDateTime').value;
        const exitDateOnly = document.getElementById('exitDate').value;

        if (entryVal && exitDateOnly) {
            const entryDate = new Date(entryVal);
            const exitDate = new Date(exitDateOnly);
            
            // הגדרת שעת היציאה להיות בדיוק כמו שעת הכניסה לחישוב ימים עגולים
            exitDate.setHours(entryDate.getHours());
            exitDate.setMinutes(entryDate.getMinutes());

            const diffInMs = exitDate.getTime() - entryDate.getTime();
            const diffInDays = diffInMs / (1000 * 60 * 60 * 24);

            if (diffInDays > 0) {
                // חישוב ימים כפול המחיר מהמקורות
                const total = Math.ceil(diffInDays) * pricePerDay;
                document.getElementById('finalSum').innerText = total.toLocaleString();
                document.getElementById('resultArea').style.display = 'block';
            } else {
                document.getElementById('resultArea').style.display = 'none';
            }
        }
    }
</script>

</body>
</html>
