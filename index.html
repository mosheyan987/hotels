<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון חניון - גרסה סופית</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .calculator-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
        }
        h2 {
            text-align: center;
            color: #1a73e8;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            font-size: 0.95em;
        }
        .checkbox-group input {
            width: auto;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #e8f0fe;
            border-right: 6px solid #1a73e8;
            border-radius: 4px;
            display: none;
        }
        .total-price {
            font-size: 1.4em;
            font-weight: bold;
            color: #d93025;
        }
        .warning-note {
            margin-top: 15px;
            font-size: 0.85em;
            color: #5f6368;
            line-height: 1.4;
            border-top: 1px solid #eee;
            padding-top: 10px;
            margin-bottom: 15px;
        }
        .pay-button {
            width: 100%;
            padding: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .pay-button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>מחשבון חנייה ותשלום</h2>
    
    <div class="form-group">
        <label for="hotelSelect">בחר מלון:</label>
        <select id="hotelSelect" onchange="calculate()">
            <option value="100">מלון דה הרברט (100 ₪)</option>
            <option value="110">מלון אופרה (110 ₪)</option>
            <option value="120">מלון פאלאס (120 ₪)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="entryDateTime">תאריך ושעת כניסה :</label>
        <input type="datetime-local" id="entryDateTime" step="900" onchange="calculate()">
    </div>

    <div class="form-group">
        <label for="exitDate">תאריך יציאה :</label>
        <input type="date" id="exitDate" onchange="calculate()">
    </div>

    <div class="form-group">
        <label for="customerName">שם הלקוח:</label>
        <input type="text" id="customerName" placeholder="הזן שם מלא">
    </div>

    <div class="form-group">
        <label for="carNumber">מספר רכב:</label>
        <input type="number" id="carNumber" placeholder="הזן מספר רכב">
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="termsCheck" onchange="toggleBtn()">
        <label for="termsCheck">
            לאישור 
            <a href="https://www.greenparking.co.il/%D7%AA%D7%A0%D7%90%D7%99-%D7%A9%D7%99%D7%9M%D7%95%D7%A9-green-parking/" target="_blank">תנאי החנייה</a>
        </label>
    </div>

    <div id="resultArea" class="result-box">
        <div id="summaryDisplay" style="margin-bottom:10px;"></div>
        <div>סה"כ לתשלום: <span class="total-price" id="totalVal">0</span> ₪</div>
        <div class="warning-note">
            המחיר מחושב לפי הכניסה לחניון (לכל 24 שעות מרגע שעת הכניסה לחניון) במידה ותצאו מעבר לשעת הכניסה לחניון תחויבו על ההפרש לפי מחירון החניון
        </div>
        <button class="pay-button" id="payBtn" disabled onclick="alert('עובר ל-UPAY...')">לתשלום באשראי</button>
    </div>
</div>

<script>
    function calculate() {
        const price = parseInt(document.getElementById('hotelSelect').value);
        const entry = document.getElementById('entryDateTime').value;
        const exitD = document.getElementById('exitDate').value;

        if (entry && exitD) {
            const entryDate = new Date(entry);
            const exitDate = new Date(exitD);
            exitDate.setHours(entryDate.getHours(), entryDate.getMinutes());

            const diff = (exitDate - entryDate) / (1000 * 60 * 60 * 24);
            if (diff > 0) {
                const total = Math.ceil(diff) * price;
                const timeStr = entryDate.getHours().toString().padStart(2,'0') + ":" + entryDate.getMinutes().toString().padStart(2,'0');
                
                document.getElementById('summaryDisplay').innerHTML = `<strong>יציאה:</strong> ${exitDate.toLocaleDateString('he-IL')} בשעה ${timeStr}`;
                document.getElementById('totalVal').innerText = total.toLocaleString();
                document.getElementById('resultArea').style.display = 'block';
                toggleBtn();
            } else {
                document.getElementById('resultArea').style.display = 'none';
            }
        }
    }

    function toggleBtn() {
        const checked = document.getElementById('termsCheck').checked;
        const visible = document.getElementById('resultArea').style.display === 'block';
        document.getElementById('payBtn').disabled = !(checked && visible);
    }
</script>

</body>
</html>
